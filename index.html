<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedro do Bypass - Dopamine 2</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
        color: #fff;
        text-align: center;
        padding: 40px 20px;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .card {
        background: #1e1e1e;
        border-radius: 20px;
        padding: 30px;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(0,122,255,0.2);
        border: 1px solid #2a2a2a;
    }
    h1 {
        font-size: 28px;
        margin-bottom: 10px;
        color: #007aff;
    }
    .by {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 20px;
    }
    .version {
        background: #2a2a2a;
        padding: 8px 15px;
        border-radius: 10px;
        display: inline-block;
        margin-bottom: 25px;
        font-size: 14px;
    }
    .btn {
        background: #007aff;
        color: #fff;
        padding: 16px 35px;
        border-radius: 14px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 700;
        display: inline-block;
        transition: 0.2s;
    }
    .btn:hover {
        background: #0051d5;
        transform: scale(1.05);
    }
    .obs {
        font-size: 12px;
        color: #888;
        margin-top: 25px;
    }
</style>
</head>
<body>
    <div class="card">
        <h1>Dopamine 2 RootHide</h1>
        <p class="by">por Pedro do Bypass</p>
        
        <div class="version">Versão 2.2.2</div>
        
        <a class="btn" href="itms-services://?action=download-manifest&url=https://SEU_USUARIO.github.io/dopamine-repo/dopamine.plist">
            Instalar Agora
        </a>
        
        <p class="obs">
            * iOS 15.0 - 16.6.1 <br>
            * Precisa estar assinado ou usar TrollStore
        </p>
    </div>
</body>
</html>
